<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Детектив - Найди Улику</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    body { 
      background:#0a0a0a; color:#e0e0e0; font-family: 'Segoe UI', 'Arial', sans-serif; 
      overflow:hidden; height:100vh; cursor: none;
    }

    /* Скрытие кастомной лупы */
    body.hide-cursor, body.hide-cursor .custom-cursor {
      cursor: default !important;
    }
    body.hide-cursor .custom-cursor {
      display: none !important;
    }

    .custom-cursor {
      position: fixed;
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    .custom-cursor img { width:100%; height:100%; object-fit:contain; }

    /* Все фоны вынесены в CSS — загружаются сразу при старте страницы */
    #scene1 { background-image: url('ProjectGame/assets/corridor.jpg'); }
    #scene2 { background-image: url('ProjectGame/assets/room.jpg'); }
    #scene3 { background-image: url('ProjectGame/assets/table_close.jpg'); }
    #scene4 { background-image: url('ProjectGame/assets/drawer_open.jpg'); }

    .scene { 
      position: absolute; inset: 0; 
      background-size: cover; background-position: center; 
      display: none; 
    }
    .scene.active { display: block; }

    .hotspot {
      position: absolute;
      cursor: none;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
    }
    .hotspot:hover {
      transform: scale(1.02);
      filter: brightness(1.08);
      background: radial-gradient(circle, rgba(220, 220, 240, 0.1) 0%, rgba(150, 150, 170, 0.05) 50%, transparent 85%);
      box-shadow: 0 0 18px rgba(180, 180, 200, 0.15);
    }

    .tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      color: #d4af37;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 30px;
      border-left: 3px solid #d4af37;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-transform: uppercase;
      font-weight: 500;
    }
    .tooltip.visible { opacity: 1; }

    .cinema-text {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      padding: 10px;
      z-index: 1000;
      pointer-events: none;
      text-transform: uppercase;
    }
    .cinema-text.hidden { display: none; }

    .modal {
      position: fixed; inset: 0; 
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal.active { opacity: 1; visibility: visible; }

    .puzzle-container {
      background: #1a1510;
      padding: 25px 30px 30px 30px;
      border: 1px solid #8b7355;
      border-radius: 4px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(139, 115, 85, 0.1);
      text-align: center;
      position: relative;
    }
    .puzzle-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      border-radius: 4px;
    }
    .puzzle-title {
      color: #c4a35a;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      margin-bottom: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 400;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    }
    
    #puzzle { display: grid; gap: 3px; background: #2a2418; padding: 6px; border-radius: 2px; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); }
    .tile { 
      width: 266px; height: 266px; 
      background-size: auto;
      background-position: 0 0;
      cursor: pointer; transition: all 0.12s ease; 
      border-radius: 1px; 
      box-shadow: inset 0 0 0 1px rgba(180, 150, 100, 0.2);
    }
    .tile:hover { transform: scale(1.01); filter: brightness(1.05); }
    .empty { background: #2a2418 !important; cursor: default; box-shadow: inset 0 0 0 1px rgba(180, 150, 100, 0.3); }
    .empty:hover { transform: none; filter: none; }

    .close-btn {
      margin-top: 25px;
      padding: 8px 28px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 1px solid #8b7355;
      color: #c4a35a;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
    }
    .close-btn:hover {
      background: #2a2418;
      border-color: #c4a35a;
      color: #e8d5a8;
    }

    .success-toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #c4a35a;
      border-radius: 8px;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      letter-spacing: 2px;
      color: #c4a35a;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(196, 163, 90, 0.2);
    }
    .success-toast.show {
      opacity: 1;
      visibility: visible;
    }
    .success-toast svg {
      width: 28px;
      height: 28px;
      stroke: #c4a35a;
      stroke-width: 2;
      fill: none;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-left: 3px solid #c4a35a;
      padding: 8px 16px;
      border-radius: 4px;
      color: #c4a35a;
      font-family: monospace;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="custom-cursor" id="customCursor"><img src="ProjectGame/assets/lupa.png" alt="cursor"></div>

<!-- Скрытая предзагрузка всех фоновых изображений (моментальные переходы) -->
<div style="display:none;">
  <img src="ProjectGame/assets/corridor.jpg">
  <img src="ProjectGame/assets/room.jpg">
  <img src="ProjectGame/assets/table_close.jpg">
  <img src="ProjectGame/assets/drawer_open.jpg">
</div>

<!-- Сцена 1: Коридор -->
<div id="scene1" class="scene active">
  <div class="hotspot" style="left: 52.7%; top: 35.9%; width: 12.3%; height: 57.6%;" 
       onmouseenter="showTooltip('ВОЙТИ В КОМНАТУ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="goToRoom()"></div>
  <div class="cinema-text">ПРИСТУПИТЬ К РАССЛЕДОВАНИЮ</div>
</div>

<!-- Сцена 2: Комната -->
<div id="scene2" class="scene">
  <div class="cinema-text">НАЙДИТЕ УЛИКУ В ЭТОМ КАБИНЕТЕ</div>
  
  <div class="hotspot" style="left: 14.9%; top: 14.2%; width: 8.7%; height: 15.4%;" 
       onmouseenter="showTooltip('СТАРИННАЯ КАРТИНА, ГЛУБОКИЙ ПЕЙЗАЖ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Ничего особенного. Просто пейзаж.')"></div>
       
  <div class="hotspot" style="left: 0.0%; top: 0.4%; width: 12.0%; height: 48.3%;" 
       onmouseenter="showTooltip('КНИЖНЫЙ ШКАФ. ТОМА В ПЫЛИ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Старые юридические тома. Ничего полезного.')"></div>
       
  <div class="hotspot" style="left: 59.9%; top: 10.2%; width: 21.8%; height: 23.7%;" 
       onmouseenter="showTooltip('БОЛЬШАЯ КАРТИНА. ХОЛСТ ПОТРЕСКАЛСЯ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Портрет в полный рост. Время не пощадило.')"></div>
       
  <div class="hotspot" style="left: 42.2%; top: 45.5%; width: 28.3%; height: 31.5%;" 
       onmouseenter="showTooltip('ПИСЬМЕННЫЙ СТОЛ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="goToTable()"></div>
</div>

<!-- Сцена 3: Стол крупно -->
<div id="scene3" class="scene">
  <div class="hotspot" style="left: 2.1%; top: 45.3%; width: 25.8%; height: 13.9%;" 
       onmouseenter="showTooltip('ПАПКА С НЕИЗВЕСТНЫМИ ДОКУМЕНТАМИ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Старые контракты. Непонятные подписи.')"></div>
  <div class="hotspot" style="left: 0.8%; top: 65.9%; width: 27.7%; height: 14.8%;" 
       onmouseenter="showTooltip('НИЖНИЙ ЯЩИК', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Пусто. Только пыль.')"></div>
  <div class="hotspot" style="left: 31.0%; top: 57.5%; width: 40.9%; height: 22.4%;" 
       onmouseenter="showTooltip('ЦЕНТРАЛЬНЫЙ ЯЩИК', event)" 
       onmouseleave="hideTooltip()" 
       onclick="openDrawerWithPhoto()"></div>
  <div class="hotspot" style="left: 73.8%; top: 67.0%; width: 25.4%; height: 12.6%;" 
       onmouseenter="showTooltip('ВЕРХНИЙ ЯЩИК', event)" 
       onmouseleave="hideTooltip()" 
       onclick="showToast('Старые письма. Ничего важного.')"></div>
  <div class="cinema-text">ОСМОТРИТЕ СТОЛ ВНИМАТЕЛЬНЕЕ</div>
</div>

<!-- Сцена 4: Открытый ящик с фотографией -->
<div id="scene4" class="scene">
  <div class="hotspot" style="left: 41%; top: 58%; width: 21%; height: 21%;" 
       onmouseenter="showTooltip('СТАРАЯ ФОТОГРАФИЯ', event)" 
       onmouseleave="hideTooltip()" 
       onclick="openPuzzleFromPhoto()"></div>
  <div class="cinema-text">ВНУТРИ НАЙДЕНА ФОТОГРАФИЯ</div>
</div>

<!-- Модальное окно пазла -->
<div id="puzzleModal" class="modal">
  <div class="puzzle-container">
    <div class="puzzle-title">ВОССТАНОВИТЬ ФОТОГРАФИЮ</div>
    <div id="puzzle"></div>
    <button class="close-btn" onclick="closePuzzle()">ЗАКРЫТЬ</button>
  </div>
</div>

<div id="successToast" class="success-toast">
  <svg class="check-circle" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M22 11.08V12C21.9988 14.1564 21.3005 16.2547 20.0093 17.9818C18.7182 19.709 16.9033 20.9725 14.8354 21.5839C12.7674 22.1953 10.5573 22.1219 8.53447 21.3746C6.51168 20.6273 4.78465 19.2461 3.61096 17.4371C2.43727 15.628 1.87979 13.4881 2.02168 11.3363C2.16356 9.18455 2.99721 7.13631 4.39828 5.49706C5.79935 3.85781 7.69279 2.71537 9.79619 2.24013C11.8996 1.7649 14.1003 1.98232 16.07 2.85999" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 4L12 14.01L9 11.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span>УЛИКА НАЙДЕНА, ФОТОГРАФИЯ ВОССТАНОВЛЕНА</span>
</div>

<div id="toast" class="toast"></div>

<script>
  const cursor = document.getElementById('customCursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.body.style.cursor = 'none';

  let tooltipDiv = null;
  function createTooltip() {
    if (!tooltipDiv) {
      tooltipDiv = document.createElement('div');
      tooltipDiv.className = 'tooltip';
      document.body.appendChild(tooltipDiv);
    }
  }
  function showTooltip(text, event) {
    createTooltip();
    tooltipDiv.textContent = text;
    tooltipDiv.style.left = (event.clientX + 20) + 'px';
    tooltipDiv.style.top = (event.clientY - 30) + 'px';
    tooltipDiv.classList.add('visible');
  }
  function hideTooltip() {
    if (tooltipDiv) tooltipDiv.classList.remove('visible');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function showSuccessMessage() {
    const successDiv = document.getElementById('successToast');
    successDiv.classList.add('show');
    setTimeout(() => {
      successDiv.classList.remove('show');
    }, 3000);
  }

  function goToRoom() {
    document.getElementById('scene1').classList.remove('active');
    document.getElementById('scene2').classList.add('active');
  }
  function goToTable() {
    document.getElementById('scene2').classList.remove('active');
    document.getElementById('scene3').classList.add('active');
  }
  function openDrawerWithPhoto() {
    document.getElementById('scene3').classList.remove('active');
    document.getElementById('scene4').classList.add('active');
  }
  function openPuzzleFromPhoto() {
    document.getElementById('scene4').classList.remove('active');
    document.getElementById('scene3').classList.add('active');
    openDrawer();
  }

  let currentOrder = [];
  let emptyIndex = 8;
  const pieces = [];
  for (let i = 1; i <= 9; i++) {
    const img = new Image();
    img.src = `ProjectGame/assets/puzzle_pieces/piece${i}.jpg`;
    pieces.push(img);
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderPuzzle() {
    const container = document.getElementById('puzzle');
    container.innerHTML = '';
    container.style.gridTemplateColumns = `repeat(3, 266px)`;
    for (let i = 0; i < 9; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      if (currentOrder[i] === 8) {
        tile.classList.add('empty');
        tile.onclick = null;
      } else {
        const pieceNum = currentOrder[i];
        const img = pieces[pieceNum];
        tile.style.backgroundImage = `url('${img.src}')`;
        tile.style.backgroundSize = 'auto';
        tile.style.backgroundPosition = '0 0';
        tile.onclick = () => moveTile(i);
      }
      container.appendChild(tile);
    }
  }

  function initPuzzle() {
    let order = [0,1,2,3,4,5,6,7,8];
    do { order = shuffleArray([...order]); } while (order[8] === 8);
    currentOrder = order;
    emptyIndex = currentOrder.findIndex(idx => idx === 8);
    renderPuzzle();
  }

  function moveTile(clickedIdx) {
    const emptyIdx = emptyIndex;
    const r1 = Math.floor(clickedIdx / 3), c1 = clickedIdx % 3;
    const r2 = Math.floor(emptyIdx / 3), c2 = emptyIdx % 3;
    if ((Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1) {
      [currentOrder[clickedIdx], currentOrder[emptyIdx]] = [currentOrder[emptyIdx], currentOrder[clickedIdx]];
      emptyIndex = clickedIdx;
      renderPuzzle();
      checkWin();
    }
  }

  function checkWin() {
    let win = true;
    for (let i = 0; i < 9; i++) {
      if (currentOrder[i] !== i) { win = false; break; }
    }
    if (win) {
      setTimeout(() => {
        showSuccessMessage();
        setTimeout(() => closePuzzle(), 2500);
      }, 200);
    }
  }

  function openDrawer() { 
    initPuzzle(); 
    document.getElementById('puzzleModal').classList.add('active');
    document.body.classList.add('hide-cursor');
    const cinemaText = document.querySelector('#scene3 .cinema-text');
    if (cinemaText) cinemaText.classList.add('hidden');
  }
  function closePuzzle() { 
    document.getElementById('puzzleModal').classList.remove('active');
    document.body.classList.remove('hide-cursor');
    const cinemaText = document.querySelector('#scene3 .cinema-text');
    if (cinemaText) cinemaText.classList.remove('hidden');
  }
</script>
</body>
</html>
